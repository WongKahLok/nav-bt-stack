# =============================================================================
# pointcloud_to_laserscan config for nav_bt_stack (ROS 2 Humble)
#
# Reduces the Livox Mid-360's PointCloud2 (/livox/lidar, real driver and sim both --
# neither emits a native LaserScan) into the LaserScan (/scan) that AMCL and the
# costmaps in nav2_params.yaml already consume. See nav2_bringup_plan.md Part 6.
# =============================================================================

/**:
  ros__parameters:
    use_sim_time: True

    # Left empty -> defaults to the input cloud's own frame (livox_frame). AMCL and the
    # costmap layers already TF-transform each LaserScan reading into base_link/map at
    # consume time via the static base_link -> livox_frame transform (published by
    # robot_state_publisher from the URDF), so this node doesn't need to do that itself.
    target_frame: ""
    transform_tolerance: 0.2

    # Vertical slice of the point cloud kept for the 2D reduction, relative to livox_frame's
    # own z-axis. PLACEHOLDER -- tune against the real mount point once the Mid-360's
    # vertical FOV and mounting height are finalized (same "tune to real chassis" caveat as
    # the mount xyz/rpy in robocup_nav's r1_sensors.urdf.xacro).
    min_height: -0.1
    max_height: 0.3

    angle_min: -3.14159265   # -180 deg
    angle_max: 3.14159265    # +180 deg
    angle_increment: 0.008726646259971648   # ~0.5 deg
    scan_time: 0.1           # matches the sim lidar's 10 Hz update_rate

    # range_max matches nav2_params.yaml's existing laser_max_range: 12.0 (RPLIDAR-derived
    # figure originally, kept as the shared ceiling across AMCL/costmaps/this node).
    range_min: 0.1
    range_max: 12.0

    use_inf: true
    inf_epsilon: 1.0
